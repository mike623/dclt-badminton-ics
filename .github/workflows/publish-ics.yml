name: Validate badminton ICS

# NOTE: the DCLT GladstoneGo API 403s from datacenter IPs (GitHub-hosted runners),
# so the ICS is generated on a UK-residential machine (see publish-local.sh + launchd)
# and pushed here. This workflow only validates the committed feed — it does NOT call the API.

on:
  push:
    paths: ["calendar.ics"]
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate calendar.ics
        run: |
          set -euo pipefail
          test -s calendar.ics
          grep -q '^BEGIN:VCALENDAR' calendar.ics
          grep -q '^END:VCALENDAR' calendar.ics
          n=$(grep -c '^BEGIN:VEVENT' calendar.ics || true)
          echo "VEVENT count: $n"
          # every event needs a stable UID for client-side dedup/diff
          u=$(grep -c '^UID:' calendar.ics || true)
          [ "$n" -eq "$u" ] || { echo "UID count ($u) != VEVENT count ($n)"; exit 1; }
          echo "OK"
